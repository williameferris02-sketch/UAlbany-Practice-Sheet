<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UAlbany Basketball — Player Development</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --purple:#46166B;--purple-dark:#2A0D45;--purple-light:#6B3A9E;--purple-faint:#F3EDF9;
  --gold:#EAAA00;--gold-dark:#C9900A;--gold-faint:#FDF8E8;
  --text:#1A1A1A;--text-sec:#555;--text-ter:#888;
  --bg:#F5F5F7;--bg2:#FFFFFF;--bg3:#EFEFEF;
  --border:#E0E0E0;--radius:8px;--radius-lg:12px;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
}
body{background:var(--bg);color:var(--text);height:100vh;overflow:hidden}
.app{display:flex;height:100vh}
.sidebar{width:220px;min-width:220px;background:var(--purple-dark);display:flex;flex-direction:column;overflow:hidden}
.sidebar-top{padding:16px 14px 12px;border-bottom:1px solid rgba(255,255,255,0.1)}
.logo-ua{font-size:10px;font-weight:600;color:var(--gold);text-transform:uppercase;letter-spacing:.1em}
.logo-title{font-size:17px;font-weight:600;color:#fff;margin-top:2px}
.gs-btn{display:flex;align-items:center;gap:7px;margin-top:10px;padding:7px 10px;border-radius:var(--radius);background:rgba(255,255,255,0.08);font-size:11px;color:rgba(255,255,255,0.7);cursor:pointer;border:1px solid rgba(255,255,255,0.15)}
.gs-btn:hover{background:rgba(255,255,255,0.14)}
.gs-dot{width:7px;height:7px;border-radius:50%;background:#888;flex-shrink:0}
.gs-dot.on{background:#4CAF50}
.refresh-btn{display:none;align-items:center;gap:6px;margin-top:6px;padding:7px 10px;border-radius:var(--radius);background:rgba(255,255,255,0.06);font-size:11px;color:rgba(255,255,255,0.6);cursor:pointer;border:1px solid rgba(255,255,255,0.1)}
.refresh-btn:hover{background:rgba(255,255,255,0.12)}
.ri{display:inline-block;font-size:13px}
.spinning .ri{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.sidebar-nav{display:flex;gap:6px;padding:10px 14px 0}
.snav-btn{flex:1;padding:5px 0;font-size:10px;font-weight:600;text-align:center;border-radius:var(--radius);border:1px solid rgba(255,255,255,0.2);background:transparent;color:rgba(255,255,255,0.55);cursor:pointer;font-family:inherit}
.snav-btn.active{background:var(--gold);color:var(--purple-dark);border-color:var(--gold)}
.snav-btn:hover:not(.active){background:rgba(255,255,255,0.1);color:#fff}
.players-lbl{font-size:10px;font-weight:600;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:.08em;padding:10px 14px 4px}
.player-list{flex:1;overflow-y:auto}
.player-list::-webkit-scrollbar{width:4px}
.player-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:2px}
.player-item{display:flex;align-items:center;gap:9px;padding:8px 14px;cursor:pointer;border-left:3px solid transparent}
.player-item:hover{background:rgba(255,255,255,0.07)}
.player-item.active{border-left-color:var(--gold);background:rgba(255,255,255,0.1)}
.av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.pname{font-size:12px;font-weight:500;color:#fff}
.psub{font-size:10px;color:rgba(255,255,255,0.45);margin-top:1px}
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column;min-width:0}
.topbar{padding:14px 24px;border-bottom:1px solid var(--border);background:var(--bg2);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:12px;position:sticky;top:0;z-index:10}
.player-hdr{display:flex;align-items:center;gap:12px}
.av-lg{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;flex-shrink:0}
.pfull{font-size:18px;font-weight:600}
.pmeta{font-size:12px;color:var(--text-sec);margin-top:2px}
.tab-bar{display:flex;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;flex-shrink:0}
.tab{padding:6px 16px;font-size:12px;cursor:pointer;background:transparent;border:none;color:var(--text-sec);font-family:inherit;border-right:1px solid var(--border)}
.tab:last-child{border-right:none}
.tab.active{background:var(--purple);color:#fff;font-weight:500}
.tab:hover:not(.active){background:var(--bg3)}
.content{padding:20px 24px;flex:1}
.sec-label{font-size:10px;font-weight:600;color:var(--text-ter);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.cum-tag{font-size:9px;font-weight:600;background:var(--purple-faint);color:var(--purple);border-radius:4px;padding:1px 5px}
.metrics-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:16px}
.mc{background:var(--bg2);border-radius:var(--radius);padding:12px 14px;border:1px solid var(--border);border-left:3px solid var(--purple)}
.mc.gold{border-left-color:var(--gold)}
.mc-label{font-size:11px;color:var(--text-sec);margin-bottom:3px}
.mc-val{font-size:22px;font-weight:600}
.mc-sub{font-size:10px;color:var(--text-ter);margin-top:3px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:12px}
.card-title{font-size:13px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.chart-wrap{position:relative;width:100%}
.sbar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.sbar-lbl{font-size:11px;color:var(--text-sec);width:145px;flex-shrink:0}
.sbar-bg{flex:1;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden}
.sbar-fill{height:100%;border-radius:3px}
.sbar-val{font-size:11px;font-weight:600;width:52px;text-align:right;flex-shrink:0}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:11px}
th{text-align:left;font-weight:600;color:var(--text-ter);font-size:10px;padding:5px 8px;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:7px 8px;border-bottom:1px solid var(--border);white-space:nowrap;color:var(--text)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg3)}
.badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600}
.b-green{background:#E8F5E9;color:#2E7D32}
.b-amber{background:#FFF8E1;color:#F57F17}
.b-purple{background:var(--purple-faint);color:var(--purple)}
.b-red{background:#FFEBEE;color:#C62828}
.btn{padding:6px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;color:var(--text);display:inline-flex;align-items:center;gap:5px}
.btn:hover{background:#E0E0E0}
.btn-primary{background:var(--purple);color:#fff;border-color:var(--purple)}
.btn-primary:hover{background:var(--purple-dark)}
.btn-danger{background:#FFEBEE;color:#C62828;border-color:#FFCDD2;padding:3px 9px;font-size:10px}
.btn-danger:hover{background:#FFCDD2}
.empty{text-align:center;padding:32px;color:var(--text-ter);font-size:13px}
.game-banner{background:var(--purple-faint);border:1px solid #C8A8E0;border-radius:var(--radius);padding:10px 16px;margin-bottom:14px;font-size:12px;color:var(--purple);display:flex;align-items:center;gap:8px}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;align-items:flex-start;justify-content:center;padding-top:48px;overflow-y:auto}
.modal-box{background:var(--bg2);border-radius:var(--radius-lg);border:1px solid var(--border);padding:24px;width:500px;max-height:88vh;overflow-y:auto;margin:0 auto}
.modal-title{font-size:15px;font-weight:600;margin-bottom:16px}
.field-label{font-size:11px;color:var(--text-sec);margin-bottom:4px;display:block}
input[type=text],input[type=number],input[type=date],select{font-size:12px;font-family:inherit;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg2);color:var(--text);padding:7px 10px;width:100%;outline:none}
input:focus,select:focus{border-color:var(--purple)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.form-grid.three{grid-template-columns:1fr 1fr 1fr}
.form-sec{font-size:11px;font-weight:600;color:var(--text-sec);margin-bottom:8px;margin-top:12px;text-transform:uppercase;letter-spacing:.05em;border-top:1px solid var(--border);padding-top:10px}
.stepper{display:flex;align-items:center;gap:8px}
.stepper-btn{width:28px;height:28px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg3);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;font-family:inherit}
.stepper-val{font-size:16px;font-weight:600;min-width:30px;text-align:center}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.formula-note{font-size:10px;color:var(--text-ter);margin-top:3px}
.info-box{background:var(--purple-faint);border:1px solid #C8A8E0;border-radius:var(--radius);padding:10px 12px;font-size:11px;color:var(--purple);margin-bottom:14px;line-height:1.6}
.lb-header{display:grid;grid-template-columns:40px 1fr 90px 90px 90px;padding:6px 14px;font-size:10px;font-weight:600;color:var(--text-ter);text-transform:uppercase;border-bottom:1px solid var(--border)}
.lb-row{display:grid;grid-template-columns:40px 1fr 90px 90px 90px;padding:10px 14px;border-bottom:1px solid var(--border);align-items:center;cursor:pointer}
.lb-row:last-child{border-bottom:none}
.lb-row:hover{background:var(--bg3)}
.lb-rank{font-size:15px;font-weight:700;color:var(--text-ter)}
.lb-rank.gold-r{color:var(--gold-dark)}
.lb-rank.silver-r{color:#90A4AE}
.lb-rank.bronze-r{color:#A1714A}
.lb-name{display:flex;align-items:center;gap:9px}
.lb-stat{font-size:13px;font-weight:600;text-align:right}
.lb-bar-wrap{width:80px;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-top:4px}
.lb-bar{height:100%;border-radius:3px;background:var(--purple)}
.lb-wl{font-size:11px;color:var(--text-sec);text-align:right}
.lb-sessions{font-size:10px;color:var(--text-ter);text-align:right}
</style>
</head>
<body>
<div class="app">
<div class="sidebar">
  <div class="sidebar-top">
    <div class="logo-ua">UAlbany Basketball</div>
    <div class="logo-title">Player Dev</div>
    <div class="gs-btn" onclick="openGsModal()">
      <div class="gs-dot" id="gsDot"></div>
      <span id="gsLabel">Connect Google Sheets</span>
    </div>
    <div class="refresh-btn" id="refreshBtn" onclick="manualRefresh()">
      <span class="ri" id="refreshIcon">&#8635;</span>
      <span id="refreshLabel">Refresh data</span>
      <span id="countdown" style="margin-left:auto;font-size:10px;color:rgba(255,255,255,0.35)"></span>
    </div>
  </div>
  <div class="sidebar-nav">
    <button class="snav-btn active" id="snavRoster" onclick="setSidebarView('roster',this)">Roster</button>
    <button class="snav-btn" id="snavLeader" onclick="setSidebarView('leaderboard',this)">Leaderboard</button>
  </div>
  <div class="players-lbl" id="sidebarLabel">Roster — 15 Players</div>
  <div class="player-list" id="playerList"></div>
</div>
<div class="main">
  <div class="topbar">
    <div class="player-hdr" id="playerHdr"></div>
    <div class="tab-bar" id="mainTabBar">
      <button class="tab active" onclick="switchTab('practice',this)">Practice</button>
      <button class="tab" onclick="switchTab('games',this)">Games</button>
      <button class="tab" onclick="switchTab('overview',this)">Overview</button>
    </div>
  </div>
  <div class="content" id="mainContent"></div>
</div>
</div>

<div class="modal-bg" id="gsModal">
<div class="modal-box" style="width:460px">
  <div class="modal-title">Connect Google Sheets</div>
  <div class="info-box">
    1. Make sure your sheet is shared: <strong>Share → Anyone with the link → Viewer</strong><br>
    2. Paste the URL below — all 15 player tabs load automatically
  </div>
  <div style="margin-bottom:12px">
    <label class="field-label">Google Sheet URL</label>
    <input type="text" id="gsUrlInput" placeholder="https://docs.google.com/spreadsheets/d/...">
  </div>
  <div id="gsErr" style="font-size:11px;color:#C62828;margin-bottom:8px;display:none"></div>
  <div class="modal-footer">
    <button class="btn" onclick="closeGsModal()">Cancel</button>
    <button class="btn btn-primary" onclick="connectSheet()">Connect &amp; Load</button>
  </div>
</div>
</div>

<div class="modal-bg" id="logModal">
<div class="modal-box" id="logModalInner"></div>
</div>

<div class="modal-bg" id="confirmModal">
<div class="modal-box" style="width:360px">
  <div class="modal-title">Remove session?</div>
  <div style="font-size:13px;color:var(--text-sec);margin-bottom:20px" id="confirmMsg"></div>
  <div class="modal-footer">
    <button class="btn" onclick="closeConfirm()">Cancel</button>
    <button class="btn btn-danger" style="font-size:13px;padding:6px 16px" onclick="confirmDelete()">Remove</button>
  </div>
</div>
</div>

<script>
const PALETTE=[
  {bg:'#EDE5F5',txt:'#46166B',ch:'#46166B'},
  {bg:'#FDF8E8',txt:'#7A5500',ch:'#C9900A'},
  {bg:'#E3EEF7',txt:'#1A3A5C',ch:'#2B5C8E'},
  {bg:'#E8F4EC',txt:'#1A4A1F',ch:'#2E7D32'},
  {bg:'#F5EDE8',txt:'#5C2A1A',ch:'#A0522D'},
  {bg:'#EDE5F5',txt:'#3C1460',ch:'#6B3A9E'},
  {bg:'#FDF8E8',txt:'#5C4000',ch:'#EAAA00'}
];
const NAMES=['Erwann Bussing','Ollie Engen','Abdoulaye Fall','U-Mier Graham','Tyler Jones','Papa Kounta','Zacharie Matulu','Ben Michaels','Petar Miovic','Moustapha Ndao','Wilkin Paulino','Miles Rose','Pedro Santos','Callum Smith','Kean Webb'];
const TAB={'Erwann Bussing':'E. Bussing','Ollie Engen':'O. Engen','Abdoulaye Fall':'A. Fall','U-Mier Graham':'U. Graham','Tyler Jones':'T. Jones','Papa Kounta':'P. Kounta','Zacharie Matulu':'Z. Matulu','Ben Michaels':'B. Michaels','Petar Miovic':'P. Miovic','Moustapha Ndao':'M. Ndao','Wilkin Paulino':'W. Paulino','Miles Rose':'M. Rose','Pedro Santos':'P. Santos','Callum Smith':'C. Smith','Kean Webb':'K. Webb'};

const ST={
  players:NAMES.map((n,i)=>({name:n,color:PALETTE[i%PALETTE.length],practice:[],games:[]})),
  selected:0,tab:'practice',charts:{},sheetId:null,sidebarView:'roster'
};

const ini=n=>n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
const cur=()=>ST.players[ST.selected];
const sumF=(arr,fn)=>arr.reduce((s,x)=>s+(parseFloat(fn(x))||0),0);
const fmt=(v,d=1)=>(v===null||v===undefined||isNaN(v)||!isFinite(v))?'—':parseFloat(v).toFixed(d);

const calcEfg=s=>{const m=sumF(s,x=>x.fgm),a=sumF(s,x=>x.fga),t=sumF(s,x=>x.tpm);return a>0?(m+0.5*t)/a*100:null;};
const calcAstTo=s=>{const a=sumF(s,x=>x.ast),t=sumF(s,x=>x.tov);return t>0?a/t:null;};
const calcReb=s=>{const m=sumF(s,x=>x.rebMade),t=sumF(s,x=>x.rebTotal);return t>0?m/t*100:null;};
const calcSpr=s=>{const m=sumF(s,x=>x.sprMade),t=sumF(s,x=>x.sprTotal);return t>0?m/t*100:null;};
const calcDrib=s=>{const m=sumF(s,x=>x.dribFgm),t=sumF(s,x=>x.dribFga);return t>0?m/t*100:null;};
const calcPot=s=>{const p=sumF(s,x=>x.potAst),a=sumF(s,x=>x.potActAst);return a>0?p/a:null;};
const totalDW=p=>sumF(p.practice,s=>s.drillW);
const totalDL=p=>sumF(p.practice,s=>s.drillL);
const dwPct=p=>{const w=totalDW(p),l=totalDL(p),t=w+l;return t?w/t*100:null;};
const dailyEfg=s=>{const a=parseFloat(s.fga)||0;return a?((parseFloat(s.fgm)||0)+0.5*(parseFloat(s.tpm)||0))/a*100:null;};

function renderSidebar(){
  document.getElementById('playerList').innerHTML=ST.players.map((p,i)=>{
    const wp=dwPct(p);
    return`<div class="player-item${i===ST.selected?' active':''}" onclick="sel(${i})">
      <div class="av" style="background:${p.color.bg};color:${p.color.txt}">${ini(p.name)}</div>
      <div><div class="pname">${p.name}</div>${wp!==null?`<div class="psub">Drill W% ${wp.toFixed(1)}%</div>`:''}</div>
    </div>`;}).join('');
}

function renderHeader(){
  const p=cur(),w=totalDW(p),l=totalDL(p),wp=dwPct(p);
  document.getElementById('playerHdr').innerHTML=`
    <div class="av-lg" style="background:${p.color.bg};color:${p.color.txt}">${ini(p.name)}</div>
    <div><div class="pfull">${p.name}</div>
    <div class="pmeta">${p.practice.length} session${p.practice.length!==1?'s':''} &nbsp;·&nbsp; Drill record: <strong>${w}–${l}</strong>${wp!==null?' ('+wp.toFixed(1)+'%)':''} &nbsp;·&nbsp; ${p.games.length} game${p.games.length!==1?'s':''}</div></div>`;
}

async function sel(i){
  ST.selected=i;
  destroyCharts();
  renderSidebar();
  renderHeader();
  if(ST.sheetId){
    document.getElementById('mainContent').innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:300px;flex-direction:column;gap:12px"><div style="width:32px;height:32px;border:3px solid #EDE5F5;border-top-color:#46166B;border-radius:50%;animation:spin .8s linear infinite"></div><div style="font-size:13px;color:#888">Loading...</div></div>';
    await loadPlayer(ST.players[i]);
  }
  renderContent();
}

function setSidebarView(view,el){
  ST.sidebarView=view;
  document.querySelectorAll('.snav-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  if(view==='roster'){
    document.getElementById('sidebarLabel').textContent='Roster — 15 Players';
    renderSidebar();
    renderHeader();
    document.getElementById('mainTabBar').style.display='flex';
    renderContent();
  } else {
    document.getElementById('sidebarLabel').textContent='Drill Win % Ranking';
    renderLeaderboardSidebar();
    renderLeaderboardMain();
    document.getElementById('mainTabBar').style.display='none';
  }
}

function renderLeaderboardSidebar(){
  const sorted=[...ST.players].map(p=>({p,wp:dwPct(p)})).sort((a,b)=>{
    if(a.wp===null&&b.wp===null)return 0;
    if(a.wp===null)return 1;
    if(b.wp===null)return -1;
    return b.wp-a.wp;
  });
  document.getElementById('playerList').innerHTML=sorted.map(({p,wp},i)=>`
    <div class="player-item" onclick="goToPlayer('${p.name}')">
      <div style="width:18px;font-size:12px;font-weight:700;color:${i===0?'#EAAA00':i===1?'#90A4AE':i===2?'#A1714A':'rgba(255,255,255,0.3)'};flex-shrink:0">${i+1}</div>
      <div class="av" style="background:${p.color.bg};color:${p.color.txt}">${ini(p.name)}</div>
      <div><div class="pname">${p.name}</div><div class="psub">${wp!==null?wp.toFixed(1)+'%':'No data'}</div></div>
    </div>`).join('');
}

function renderLeaderboardMain(){
  const sorted=[...ST.players].map(p=>({p,wp:dwPct(p),tw:totalDW(p),tl:totalDL(p)})).sort((a,b)=>{
    if(a.wp===null&&b.wp===null)return 0;
    if(a.wp===null)return 1;
    if(b.wp===null)return -1;
    return b.wp-a.wp;
  });
  const maxWp=sorted.find(x=>x.wp!==null)?.wp||1;
  const rankCls=i=>i===0?'gold-r':i===1?'silver-r':i===2?'bronze-r':'';
  document.getElementById('playerHdr').innerHTML='<div><div class="pfull" style="font-size:20px">🏆 Drill Win % Leaderboard</div><div class="pmeta">Season ranking — highest to lowest drill win percentage</div></div>';
  document.getElementById('mainContent').innerHTML=`
    <div class="card" style="padding:0;overflow:hidden">
      <div class="lb-header"><div>#</div><div>Player</div><div style="text-align:right">Win %</div><div style="text-align:right">W–L</div><div style="text-align:right">Sessions</div></div>
      ${sorted.map(({p,wp,tw,tl},i)=>`
        <div class="lb-row" onclick="goToPlayer('${p.name}')">
          <div class="lb-rank ${rankCls(i)}">${i+1}</div>
          <div class="lb-name">
            <div class="av" style="background:${p.color.bg};color:${p.color.txt}">${ini(p.name)}</div>
            <div>
              <div style="font-size:12px;font-weight:600">${p.name}</div>
              <div class="lb-bar-wrap"><div class="lb-bar" style="width:${wp!==null?Math.round(wp/maxWp*100):0}%;background:${i===0?'var(--gold)':'var(--purple)'}"></div></div>
            </div>
          </div>

function sbar(label,pv,max,color,suffix,over){
  const w=pv!==null&&pv!==undefined?Math.min(Math.round((parseFloat(pv)||0)/max*100),100):0;

  return`<div class="sbar-row"><span class="sbar-lbl">${label}</span><div class="sbar-bg"><div class="sbar-fill" style="width:${w}%;background:${color}"></div></div><span class="sbar-val">${d}</span></div>`;
}

function extractId(url){const m=url.match(/\/spreadsheets\/d\/([a-zA-Z0-9-_]+)/);return m?m[1]:null;}

async function connectSheet(){
  const url=document.getElementById('gsUrlInput').value.trim();
  const errEl=document.getElementById('gsErr');errEl.style.display='none';
  const id=extractId(url);
  if(!id){errEl.textContent='Could not find a Sheet ID in that URL.';errEl.style.display='block';return;}
  ST.sheetId=id;
  document.getElementById('gsDot').classList.add('on');
  document.getElementById('gsLabel').textContent='Loading players...';
  closeGsModal();
  await Promise.all(ST.players.map(p=>loadPlayer(p)));
  const loaded=ST.players.filter(p=>p.practice.length>0).length;
  document.getElementById('gsLabel').textContent='Connected \u2713 ('+loaded+'/15 loaded)';
  document.getElementById('refreshBtn').style.display='flex';
  renderSidebar();renderHeader();renderContent();
  startAutoRefresh();
}

async function loadPlayer(player){
  if(!ST.sheetId)return;
  const tab=TAB[player.name];
  const url='https://docs.google.com/spreadsheets/d/'+ST.sheetId+'/gviz/tq?tqx=out:csv&sheet='+encodeURIComponent(tab);
  try{
    const res=await fetch(url);
    if(!res.ok)return;
    const text=await res.text();
    if(text.includes('accounts.google.com'))return;
    parseSheet(player,text);
  }catch(e){console.error('Load error',player.name,e);}
}

function parseCSV(text){
  const rows=[];let c='';let inQ=false;let row=[];
  for(let i=0;i<text.length;i++){
    const ch=text[i];
    if(ch==='"'){inQ=!inQ;}
    else if(ch===','&&!inQ){row.push(c.replace(/^"|"$/g,'').trim());c='';}
    else if((ch==='\n'||ch==='\r')&&!inQ){if(c||row.length){row.push(c.replace(/^"|"$/g,'').trim());rows.push(row);row=[];c='';}}
    else c+=ch;
  }
  if(c||row.length){row.push(c.replace(/^"|"$/g,'').trim());rows.push(row);}
  return rows;
}

function parseSheet(player,csvText){
  const rows=parseCSV(csvText);
  if(rows.length<2)return;
  let hdr=-1;
  const knownCols=['drill wins','drill losses','fg made','fg att','assists','sprints made'];
  for(let i=0;i<Math.min(rows.length,6);i++){
    const low=rows[i].map(c=>c.toLowerCase().replace(/"/g,'').trim());
    if(knownCols.filter(k=>low.some(c=>c.includes(k))).length>=3){hdr=i;break;}
  }
  if(hdr<0){
    for(let i=0;i<Math.min(rows.length,6);i++){
      if(rows[i].some(c=>c.toLowerCase().includes('date'))){hdr=i;break;}
    }
  }
  if(hdr<0)return;
  const h=rows[hdr].map(x=>x.toLowerCase().replace(/["\n\r]/g,'').trim());
  const c=(...terms)=>{for(const t of terms){const i=h.findIndex(x=>x.includes(t));if(i>=0)return i;}return -1;};
  const dateC=c('date');
  const dwC=c('drill wins','drill win');
  const dlC=c('drill losses','drill loss');
  const fgmC=c('fg made');
  const fgaC=c('fg att');
  const tpmC=c('3pm');
  const astC=c('assists');
  const tovC=c('turnovers','turnover');
  const rmC=c('reb made');
  const rtC=c('reb opps','reb opp');
  const smC=c('sprints made','sprint made');
  const stC=c('sprints total','sprint total');
  const d1C=c('2+ drib fgm','drib fgm');
  const d2C=c('2+ drib fga','drib fga');
  const p1C=c('potential assists');
  const p2C=c('actual assists');
  player.practice=[];player.games=[];
  let sNum=1;
  for(let i=hdr+1;i<rows.length;i++){
    const r=rows[i];
    if(r.every(c=>!c||c.trim()===''))continue;
    if(!r.some((c,ci)=>ci>0&&(parseFloat(c)>0||parseInt(c)>0)))continue;
    const date=dateC>=0&&r[dateC]&&r[dateC].trim()!==''?r[dateC].trim():'Session '+sNum;
    sNum++;
    player.practice.push({
      date,
      drillW:dwC>=0?parseInt(r[dwC])||0:0,
      drillL:dlC>=0?parseInt(r[dlC])||0:0,
      fgm:fgmC>=0?parseFloat(r[fgmC])||0:0,
      fga:fgaC>=0?parseFloat(r[fgaC])||0:0,
      tpm:tpmC>=0?parseFloat(r[tpmC])||0:0,
      ast:astC>=0?parseInt(r[astC])||0:0,
      tov:tovC>=0?parseInt(r[tovC])||0:0,
      rebMade:rmC>=0?parseInt(r[rmC])||0:0,
      rebTotal:rtC>=0?parseInt(r[rtC])||0:0,
      sprMade:smC>=0?parseInt(r[smC])||0:0,
      sprTotal:stC>=0?parseInt(r[stC])||0:0,
      dribFgm:d1C>=0?parseInt(r[d1C])||0:0,
      dribFga:d2C>=0?parseInt(r[d2C])||0:0,
      potAst:p1C>=0?parseInt(r[p1C])||0:0,
      potActAst:p2C>=0?parseInt(r[p2C])||0:0,
    });
  }
}

let countdownTimer=null;let secondsLeft=30;
function startAutoRefresh(){
  if(countdownTimer)clearInterval(countdownTimer);
  secondsLeft=30;
  countdownTimer=setInterval(async()=>{
    secondsLeft--;
    const el=document.getElementById('countdown');
    if(el)el.textContent='Auto in '+secondsLeft+'s';
    if(secondsLeft<=0){secondsLeft=30;await doRefresh();}
  },1000);
}
async function doRefresh(){
  if(!ST.sheetId)return;
  const btn=document.getElementById('refreshBtn');
  const lbl=document.getElementById('refreshLabel');
  if(btn)btn.classList.add('spinning');
  if(lbl)lbl.textContent='Refreshing...';
  await Promise.all(ST.players.map(p=>loadPlayer(p)));
  destroyCharts();renderSidebar();renderHeader();renderContent();
  if(ST.sidebarView==='leaderboard'){renderLeaderboardSidebar();renderLeaderboardMain();}
  if(btn)btn.classList.remove('spinning');
  if(lbl)lbl.textContent='Refresh data';
  secondsLeft=30;
}
async function manualRefresh(){secondsLeft=30;await doRefresh();}

['gsModal','logModal','confirmModal'].forEach(id=>{
  document.getElementById(id).addEventListener('click',e=>{if(e.target===document.getElementById(id))document.getElementById(id).style.display='none';});
});

renderSidebar();renderHeader();renderContent();
</script>
